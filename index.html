<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calculadora de Vendas — Azul Clara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --accent:#3399FF;
  --accent-2:#66CCFF;
  --bg:rgba(18,28,45,0.25);
  --text:#ffffff;
  --card-shadow:0 10px 30px rgba(3,10,23,0.15);
  --bg-image:url('https://picsum.photos/1600/900?blur=3');
}

body{
  margin:0;
  font-family:'Poppins',system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  color:var(--text);
  background:
    linear-gradient(rgba(8,12,20,0.75), rgba(8,12,20,0.75)),
    var(--bg-image) center/cover no-repeat fixed;
  min-height:100vh;
  display:flex;
  flex-direction: column;
  align-items:center;
  padding:28px;
}

.app{
  width:100%;
  max-width:980px;
  display:grid;
  grid-template-columns:1fr 380px;
  gap:20px;
}
@media(max-width:900px){.app{grid-template-columns:1fr;}}

.card{
  background: var(--bg);
  border-radius:14px;
  padding:18px;
  box-shadow: var(--card-shadow);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0, 13, 36, 0.85);
}

.logo{display:block; max-width:200px; margin:0 auto 12px auto;}

.items-list{display:flex;flex-direction:column;gap:12px;}
.item-row{
  display:grid;
  grid-template-columns:60px 1fr 120px 80px;
  gap:8px;
  align-items:center;
  padding:12px 10px;
  border-radius:10px; 
  background: linear-gradient(90deg, rgba(51,153,255,0.1), rgba(102,204,255,0.05));
  transition: all 0.3s;
}
.item-row:hover{background: linear-gradient(90deg, rgba(51,153,255,0.2), rgba(102,204,255,0.1));}

.item-row input[type="number"]{
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(0,0,0,0.08);
  width:100%;
  text-align:center;
  font-weight:600;
  font-size:14px;
}
.item-row .iprice{
  padding:10px;
  border-radius:8px;
  background:rgba(51,153,255,0.1); 
  font-weight:700; 
  text-align:center;
  font-size:14px;
}
.item-row i{
  font-size:28px;
  color:var(--accent);
  display:flex;
  justify-content:center;
}

.total-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:12px;
  font-weight:700;
  font-size:18px;
  background: linear-gradient(90deg,var(--accent),var(--accent-2));
  color:white; 
  padding:8px 14px; 
  border-radius:8px; 
  transition: all 0.3s ease;
}

button.btn{
  background:var(--accent); 
  color:white; 
  border:none; 
  padding:10px 12px; 
  border-radius:10px; 
  cursor:pointer; 
  display:inline-flex; 
  align-items:center; 
  gap:6px; 
  font-weight:600;
}
button.btn.ghost{
  background:transparent; 
  border:1px solid rgba(0,0,0,0.08); 
  color:var(--text);
}
button.small{padding:6px 8px; font-size:14px;}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px;}
th,td{text-align:left;padding:10px 8px;}
th{color:white;background: linear-gradient(90deg,var(--accent),var(--accent-2)); font-weight:600;border-radius:8px;}
td.right{text-align:right;}

.history-item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:10px;
  border-radius:8px;
  background: linear-gradient(180deg, rgba(51,153,255,0.15), rgba(102,204,255,0.05));
  margin-bottom:8px;
  align-items:center;
}

.qty-btn {
  background: var(--accent);
  color: white;
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.2s;
}
.qty-btn:hover { background: var(--accent-2); }

</style>
</head>
<body>

<div class="app">
  <div class="card calculator">
    <img src="https://cdn.discordapp.com/attachments/955108700744470580/1419830211188494386/ChatGPT_Image_22_de_set._de_2025_20_37_52.png" alt="Logo" class="logo">

    <div class="top-bar" style="text-align:center; margin-bottom:15px;">
      <h1><i class="fa-solid fa-calculator"></i> Calculadora CUS</h1>
    </div>

    <button class="btn small" id="toggleCostPrice" style="margin-bottom:10px;">
      <i class="fa-solid fa-coins"></i> Preço de Custo: OFF
    </button>

    <div style="margin-bottom:10px;">
      <label for="clientPass">Passaporte / Paciente:</label>
      <input type="text" id="clientPass" placeholder="Ex: 123456789" style="width:100%; padding:6px 8px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; font-size:14px; box-sizing: border-box;">
    </div>

    <div class="items-list" id="itemsList"></div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Item</th><th>Qtd</th><th class="right">Subtotal (R$)</th></tr></thead>
        <tbody id="vendaTable"></tbody>
      </table>
    </div>

    <div class="total-line"><div>Total</div><div id="totalValue">R$ 0,00</div></div>

    <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn" id="btnSaveSale"><i class="fa-solid fa-circle-check"></i> Salvar Venda</button>
      <button class="btn ghost" id="btnReset"><i class="fa-solid fa-rotate-right"></i> Limpar</button>
    </div>
  </div>

  <div class="card right-col">
    <h3><i class="fa-solid fa-clock-rotate-left"></i> Histórico de Vendas</h3>
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">
      <button class="btn" id="downloadCSV"><i class="fa-solid fa-file-csv"></i> CSV</button>
      <button class="btn" id="downloadPDF"><i class="fa-solid fa-file-pdf"></i> PDF</button>
      <button class="btn ghost" id="clearHistory"><i class="fa-solid fa-trash"></i> Limpar</button>
    </div>
    <div id="historyList" style="margin-top:10px;"></div>
  </div>
</div>

<footer style="text-align:center; margin-top:40px; padding-bottom:20px; color:rgba(255,255,255,0.8); font-size:12px; line-height:1.6;">
    <div style="font-weight:600; letter-spacing:1px; margin-bottom:4px;">
        &copy; Copyright 2026 — CALCULADORA DE USO EXCLUSIVO
    </div>
    <div style="font-weight:400; opacity:0.9;">
        Hospital CUS — Capital Valley Sul
    </div>
    <div style="margin-top:8px; font-size:10px; opacity:0.5;">
        Desenvolvido por <span style="color:#3399FF;">N. F.</span>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

// Som de clique
const clickSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-interface-click-1126.mp3");

// Função para tocar som sem delay
function playClick() {
  clickSound.currentTime = 0;
  clickSound.play();
}

(() => {
  // Configurações de imagem
  const bgImage = "imagens/fundo.png"; // 🔵 LINK DA IMAGEM DE FUNDO
  const logoImage = "imagens/logoCUS.png"; // 🔵 LINK DA LOGO 
  document.documentElement.style.setProperty('--bg-image', `url('${bgImage}')`);
  document.querySelector('.logo').src = logoImage;

  // Formatação de moeda Brasileira
  const formatBR=n=>n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  
  // Variáveis de estado
  let currentItems=[], history=JSON.parse(localStorage.getItem('calc_history_v1')||'[]');
  const itemsListEl=document.getElementById('itemsList'), vendaTableBody=document.getElementById('vendaTable'), totalValueEl=document.getElementById('totalValue'), historyListEl=document.getElementById('historyList');

  // Itens fixos da calculadora
  const defaultItems=[
    {name:'Bandagem', price:400, icon:'fa-bandage'},
    {name:'Kit Médico', price:700, icon:'fa-kit-medical'},
    {name:'Calmante', price:1000, icon:'fa-capsules'},
    {name:'Tratamento', price:500, icon:'fa-user-nurse'}
  ];

  // Estado do modo de preço de custo
  let costMode = false;

  // Definição de preços (Normal vs Custo)
  const normalPrices = { 'Bandagem': 400, 'Kit Médico': 700, 'Calmante': 1000, 'Tratamento': 500 };
  const costPrices = { 'Bandagem': 150, 'Kit Médico': 350, 'Calmante': 700, 'Tratamento': 500 };

  // Alternar preços ao clicar no botão de custo
  document.getElementById('toggleCostPrice').addEventListener('click', () => {
    costMode = !costMode;
    const btn = document.getElementById('toggleCostPrice');

    if (costMode) {
      btn.innerHTML = `<i class="fa-solid fa-coins"></i> Preço de Custo: ON`;
      btn.style.background = "#e67e22"; // Laranja
    } else {
      btn.innerHTML = `<i class="fa-solid fa-coins"></i> Preço de Custo: OFF`;
      btn.style.background = "var(--accent)"; // Azul
    }

    // Atualiza os preços exibidos na interface
    const rows = Array.from(document.querySelectorAll('.item-row'));
    rows.forEach(row => {
      const name = row.querySelector('.iname').textContent.trim();
      const priceEl = row.querySelector('.iprice');
      const price = costMode ? costPrices[name] : normalPrices[name];
      priceEl.textContent = `R$ ${formatBR(price)}`;
    });
    recalcPreview();
  });

  // Função para criar a linha de cada item
  function createItemRow(data) {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <i class="fa-solid ${data.icon}"></i>
      <div class="iname">${data.name}</div>
      <div style="display:flex; align-items:center; gap:6px; justify-content:center;">
        <button class="qty-btn minus">–</button>
        <input type="number" class="qty-input" value="0" min="0" style="width:55px; text-align:center; font-weight:700; border-radius:8px; border:1px solid rgba(0,0,0,0.1); padding:6px;">
        <button class="qty-btn plus">+</button>
      </div>
      <span class="iprice">R$ ${formatBR(data.price)}</span>
    `;

    const qtyInput = div.querySelector('.qty-input');
    div.querySelector('.plus').addEventListener('click', () => { playClick(); qtyInput.value = parseInt(qtyInput.value || 0) + 1; recalcPreview(); });
    div.querySelector('.minus').addEventListener('click', () => { playClick(); let current = parseInt(qtyInput.value || 0); if (current > 0) { qtyInput.value = current - 1; recalcPreview(); } });
    qtyInput.addEventListener('input', () => { if (qtyInput.value < 0) qtyInput.value = 0; recalcPreview(); });
    return div;
  }

  // Inicializa a lista de itens
  function addFixedRows(){ itemsListEl.innerHTML=''; defaultItems.forEach(it=>itemsListEl.appendChild(createItemRow(it))); recalcPreview(); }

  // Recalcula o subtotal e total em tempo real
  function recalcPreview(){
    const rows=Array.from(itemsListEl.querySelectorAll('.item-row'));
    currentItems=rows.map(r=>{
      const name=r.querySelector('.iname').textContent;
      const price=parseFloat(r.querySelector('.iprice').textContent.replace(/\./g,'').replace(',', '.').replace(/[^\d.]/g,''))||0;
      const qty = parseInt(r.querySelector('.qty-input').value) || 0;
      return {name, price, qty, subtotal:Math.max(0,price*qty)};
    }).filter(it=>it.qty>0);

    vendaTableBody.innerHTML='';
    let total=0;
    currentItems.forEach(it=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${it.name}</td><td>${it.qty}</td><td class="right">R$ ${formatBR(it.subtotal)}</td>`;
      vendaTableBody.appendChild(tr);
      total+=it.subtotal;
    });

    // Animação numérica do total
    let start=0, end=total, duration=400;
    const startTime=performance.now();
    function animate(time){
      let progress=Math.min((time-startTime)/duration,1);
      let displayValue=start + (end-start)*progress;
      totalValueEl.textContent=`R$ ${formatBR(displayValue)}`;
      if(progress<1) requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  }

  // Salva a venda no histórico e no LocalStorage
  function saveSale(){
    recalcPreview();
    if(currentItems.length===0){alert('Nenhum item válido.'); return;}

    const total=currentItems.reduce((s,i)=>s+i.subtotal,0);
    const timestamp=new Date().toLocaleString('pt-BR');
    const clientPass=document.getElementById('clientPass').value || '-';

    const record={
      id:Date.now(),
      timestamp,
      total,
      items:currentItems,
      clientPass,
      costMode, // Salva se foi preço de custo para aplicar a cor depois
      saleType: costMode ? "Preço de Custo" : "Normal"
    };

    history.unshift(record);
    if(history.length>200) history=history.slice(0,200);
    localStorage.setItem('calc_history_v1',JSON.stringify(history));
    renderHistory();

    // Limpa campos após salvar
    itemsListEl.querySelectorAll('.qty-input').forEach(q => q.value = 0);
    document.getElementById('clientPass').value='';
    recalcPreview();
  }

  // Renderiza a lista de histórico na lateral com cores (Azul/Laranja)
  function renderHistory(){
    historyListEl.innerHTML='';
    if(history.length===0){historyListEl.innerHTML='<div style="padding:12px;color:rgba(255,255,255,0.5)">Nenhuma venda registrada.</div>'; return;}
    
    history.forEach(record=>{
      const div=document.createElement('div'); div.className='history-item';
      const left=document.createElement('div');
      
      // Define a cor baseada no tipo de venda para o histórico lateral
      const typeColor = record.costMode ? "#e67e22" : "#3399FF";
      
      left.innerHTML=`
        <div style="font-weight:600">R$ ${formatBR(record.total)}</div>
        <div class="history-meta" style="font-size:11px; opacity:0.8;">${record.timestamp}</div>
        <div style="font-size:12px; color:${typeColor}; font-weight:600">${record.saleType}</div>
        <div style="font-size:12px; opacity:0.7;">Passaporte: ${record.clientPass}</div>`;
      
      const right=document.createElement('div'); right.style.textAlign='right';
      right.innerHTML=`
        <button class="btn small" data-id="${record.id}"><i class="fa-solid fa-eye"></i></button>
        <button class="btn small ghost" data-del="${record.id}"><i class="fa-solid fa-trash"></i></button>`;
      
      div.appendChild(left); div.appendChild(right); historyListEl.appendChild(div);

      // Evento de Visualizar Detalhes
      right.querySelector('[data-id]').addEventListener('click',()=>{
        const rec=history.find(h=>h.id==record.id);
        alert(`${rec.timestamp}\nModo: ${rec.saleType}\nTotal: R$ ${formatBR(rec.total)}\nPassaporte: ${rec.clientPass}\n\nItens:\n${rec.items.map(it=>`${it.name} x${it.qty} = R$ ${formatBR(it.subtotal)}`).join('\n')}`);
      });

      // Evento de Excluir Registro
      right.querySelector('[data-del]').addEventListener('click',e=>{
        if(!confirm('Remover registro?')) return;
        const id=parseInt(e.currentTarget.getAttribute('data-del'));
        history=history.filter(h=>h.id!==id);
        localStorage.setItem('calc_history_v1',JSON.stringify(history));
        renderHistory();
      });
    });
  }

  // Exportar para CSV
  document.getElementById('downloadCSV').addEventListener('click',()=>{
    if(history.length===0){alert('Não há histórico.'); return;}
    let csv='Timestamp,Modo,Total (R$),Passaporte,Itens\n';
    history.forEach(h=>{
      const itemsStr=h.items.map(i=>`${i.name} x${i.qty}`).join(' | ');
      csv+=`"${h.timestamp}","${h.saleType}",${h.total.toFixed(2)},"${h.clientPass}","${itemsStr}"\n`;
    });
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='historico_vendas.csv'; a.click();
  });

  // Exportar para PDF com separação por cores e blocos
  document.getElementById('downloadPDF').addEventListener('click', async () => {
    if (history.length === 0) { alert('Não há histórico.'); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'a4' });
    
    doc.setFontSize(18);
    doc.setTextColor(51, 153, 255);
    doc.text('Relatório de Vendas - Hospital CUS', 40, 45);
    
    let y = 80;

    history.forEach(h => {
      // Verifica se precisa de nova página
      if (y > 720) { doc.addPage(); y = 50; }

      // 🎨 Aplica cor baseada no tipo de venda: Laranja para Custo, Azul para Normal
      if (h.costMode) {
        doc.setFillColor(230, 126, 34); 
      } else {
        doc.setFillColor(51, 153, 255); 
      }

      // Desenha a barra lateral indicativa de cor
      doc.rect(40, y, 5, 50, 'F');
      
      // Cabeçalho da venda no PDF
      doc.setFontSize(11);
      doc.setFont(undefined, 'bold');
      doc.setTextColor(30, 30, 30);
      doc.text(`${h.timestamp} — ${h.saleType}`, 55, y + 12);

      // Detalhes da venda
      doc.setFont(undefined, 'normal');
      doc.setFontSize(10);
      doc.text(`Total: R$ ${formatBR(h.total)} | Passaporte: ${h.clientPass}`, 55, y + 26);

      // Listagem de itens
      doc.setFontSize(9);
      doc.setTextColor(80, 80, 80);
      const itemsTxt = "Itens: " + h.items.map(it => `${it.name} (x${it.qty})`).join(' | ');
      const splitItems = doc.splitTextToSize(itemsTxt, 480);
      doc.text(splitItems, 55, y + 38);

      y += 65; // Espaçamento para a próxima venda no PDF
    });

    doc.save('historico_vendas_cus.pdf');
  });

  // Botões de ação geral
  document.getElementById('btnSaveSale').addEventListener('click',saveSale);
  document.getElementById('btnReset').addEventListener('click',()=>{if(confirm('Limpar campos?')) addFixedRows();});
  document.getElementById('clearHistory').addEventListener('click',()=>{if(confirm('Limpar histórico?')){history=[]; localStorage.removeItem('calc_history_v1'); renderHistory();}});

  // Inicialização do Script
  addFixedRows(); renderHistory();
})();
</script>

</body>
</html>
